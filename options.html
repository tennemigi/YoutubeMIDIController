<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube MIDI Controller 設定</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; }
      textarea { width: 100%; height: 240px; font-family: monospace; }
      .message { margin-top: 10px; color: green; }
      .error { color: red; }
      .instruction { margin: 10px 0; font-size: 18px; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>マッピング設定</h1>
    <p>ここにJSONでMIDIマッピングを指定できます。保存後、拡張機能を再読み込みしてください。</p>
    <textarea id="mapJson"></textarea>
    <div>
      <button id="saveBtn">保存</button>
      <button id="restoreBtn">デフォルト</button>
    </div>
    <div id="hint" class="message"></div>
    <script src="options.js"></script>
  </body>
</html>
